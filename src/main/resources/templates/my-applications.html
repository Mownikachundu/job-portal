<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Applications</title>
</head>

<body>

<h2>My Applications</h2>

<table border="1">

    <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Status</th>
        <th>Applied Date</th>
    </tr>

    <tr th:each="app : ${applications}">

        <td th:text="${app.job.title}"></td>

        <td th:text="${app.job.company.name}"></td>

        <td th:text="${app.status}"></td>

        <td th:text="${#temporals.format(app.appliedDate, 'dd-MM-yyyy hh:mm a')}"></td>

    </tr>

</table>

<br>

<a th:href="@{/jobseeker/jobs}">
    <button>Back</button>
</a>

</body>
</html>
